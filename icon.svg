<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#0b0f14"/>
  <!-- 図面外枠 -->
  <rect x="80" y="100" width="352" height="312" rx="8" fill="none" stroke="#2ecc71" stroke-width="16"/>
  <!-- タイトル枠 -->
  <rect x="80" y="352" width="352" height="60" rx="0" fill="none" stroke="#2ecc71" stroke-width="8"/>
  <!-- 寸法線（横） -->
  <line x1="110" y1="320" x2="370" y2="320" stroke="#2ecc71" stroke-width="6"/>
  <line x1="110" y1="310" x2="110" y2="330" stroke="#2ecc71" stroke-width="6"/>
  <line x1="370" y1="310" x2="370" y2="330" stroke="#2ecc71" stroke-width="6"/>
  <!-- 建物輪郭（簡略） -->
  <polyline points="140,300 140,180 200,140 320,140 320,300" fill="none" stroke="#2ecc71" stroke-width="10" stroke-linejoin="round"/>
  <!-- 屋根 -->
  <polyline points="120,195 240,130 360,195" fill="none" stroke="#f39c12" stroke-width="8" stroke-linejoin="round"/>
  <!-- DXF文字 -->
  <text x="256" y="400" text-anchor="middle" font-family="monospace" font-size="38" font-weight="bold" fill="#2ecc71">DXF View</text>
</svg>
